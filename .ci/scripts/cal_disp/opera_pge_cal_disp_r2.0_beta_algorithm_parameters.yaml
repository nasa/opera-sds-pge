# CAL-DISP Algorithm Parameters
# Configuration for the calibration algorithm
# Schema version: 0.2

# GNSS calibration and windowed surface-fitting options.
calibration_options:

  # GNSS model type: 'constant' uses a velocity field scaled to the acquisition interval; 'variable' fetches
  # epoch-specific displacements.
  grid_type: constant

  # GNSS reference frame used for station timeseries.
  reference_frame: IGS20

  # Apply watershed-based unwrap-error correction to the displacement field before fitting the calibration surface.
  starting_year: 2014.0

  # Apply watershed-based unwrap-error correction to the displacement field before fitting the calibration surface.
  unwrap_error_correction: true

  # Side length of the moving window used for polynomial plane fitting, in metres.
  window_size_meters: 600000.0

  # Input DISP pixel spacing in metres (30 m for DISP-S1).
  posting_meters: 30.0

  # Downsampling factor for DISP.
  downsample_factor: 1

  # Pixel aggregation method used during downsampling.
  downsample_method: mean

  # Weight downsampling by temporal coherence. When True, the temporal_coherence layer from the DISP product is used
  # as per-pixel weights during aggregation.  Falls back to unweighted downsampling if the layer is unavailable.
  downsample_weighted: false

  # Post-assembly low-pass filter applied to the stitched calibration surface.  Options: 'gaussian'
  # (spatial-domain, default), 'gaussian_fft', 'hanning_fft', or 'savitzky_golay'.
  calibration_surface_smoothing_method: gaussian

  # Sigma (pixels) for gaussian and FFT smoothing methods. None auto-selects window_size_pixels/8; 0 disables
  # smoothing. Ignored when calibration_surface_smoothing_method='savitzky_golay'.
  calibration_surface_smoothing_sigma: 0.0

  # Savitzky-Golay filter parameters. Active when calibration_surface_smoothing_method='savitzky_golay'.
  savitzky_golay:

    # Filter window length in pixels (must be odd).
    window_length: 51

    # Polynomial order for fitting.
    polyorder: 3

    # Derivative order (0 = smoothing only).
    deriv: 0

  # FFT filter parameters. Active whencalibration_surface_smoothing_method is an FFT variant.
  fft_filter:

    # Gaussian filter standard deviation in wavelength units.
    gaussian_sigma: 0.1

    # Butterworth filter order.
    butterworth_order: 4

    # Apply filter in spatial domain instead of frequency domain.
    spatial_domain: false

    # Taper image edges to reduce ringing artefacts.
    taper_edges: true

    # Taper width as a fraction of the image dimensions.
    taper_width: 0.05
