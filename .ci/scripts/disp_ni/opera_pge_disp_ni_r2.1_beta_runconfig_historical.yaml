        # REQUIRED: Frame ID of the bursts contained in `gslc_file_list`.
        #   Type: integer.
        frame_id: 26410
        # REQUIRED: Frequency in which gslcs are acquired.
        #   Type: string.
        frequency: frequencyA
        # REQUIRED: Polarization of the gslcs contained in `gslc_file_list`.
        #   Type: string.
        polarization: HH
        # (For FORWARD mode) last processed date for the frame. If provided, the SAS will only
        #   output products whose secondary datetime is *after* `last_processed`.
        #   Type: string | null.
        last_processed:
      dynamic_ancillary_file_group:
        # REQUIRED: Path to file containing SAS algorithm parameters.
        #   Type: string.
        algorithm_parameters_file: /home/mamba/runconfig/opera_pge_disp_ni_r2.1_beta_algorithm_parameters_historical.yaml
        # Paths to the GSLC static_layer files (1 per burst) with line-of-sight unit vectors. If
        #   none provided, corrections using GSLC static_layer are skipped.
        #   Type: array.
        mask_file: /home/mamba/input_dir/dynamic_ancillary_files/water_mask.vrt
        # Path to the DEM file covering full frame. If none provided, corrections using DEM are
        #   skipped.
        #   Type: string | null.
        dem_file:
        # List of paths to gunw files for ionosphere correction. They are interferograms and need
        #   to cover the date range in GSLC data list. If none
        #   provided, ionosphere corrections are skipped.
        #   Type: array | null.
        gunw_files:
          - /home/mamba/input_dir/dynamic_ancillary_files/gunw_files/NISAR_L2_PR_GUNW_004_151_A_011_005_4000_SH_20251108T155041_20251108T155058_20251120T155041_20251120T155058_X05010_N_P_J_001.h5
          - /home/mamba/input_dir/dynamic_ancillary_files/gunw_files/NISAR_L2_PR_GUNW_005_151_A_011_006_4000_SH_20251120T155041_20251120T155058_20251202T155042_20251202T155059_X05010_N_P_J_001.h5
          - /home/mamba/input_dir/dynamic_ancillary_files/gunw_files/NISAR_L2_PR_GUNW_006_151_A_011_008_4000_SH_20251202T155042_20251202T155059_20251226T155043_20251226T155100_X05010_N_P_J_001.h5
          - /home/mamba/input_dir/dynamic_ancillary_files/gunw_files/NISAR_L2_PR_GUNW_008_151_A_011_009_4000_SH_20251226T155043_20251226T155100_20260107T155044_20260107T155100_X05010_N_P_J_001.h5
          - /home/mamba/input_dir/dynamic_ancillary_files/gunw_files/NISAR_L2_PR_GUNW_009_151_A_011_010_4000_SH_20260107T155044_20260107T155100_20260119T155044_20260119T155101_X05010_N_P_J_001.h5

        # List of paths to troposphere weather model files (1 per date). If none provided,
        #   troposphere corrections are skipped.
        #   Type: array | null.
        troposphere_files:
      static_ancillary_file_group:
        # JSON file containing frame-specific algorithm parameters to override the defaults passed
        #   in the `algorithm_parameters.yaml`.
        #   Type: string | null.
        algorithm_parameters_overrides_json: /home/mamba/input_dir/static_ancillary_files/opera-disp-nisar-algorithm-parameters-overrides.json
        # JSON file containing the mapping from frame_id to bounds information.
        #   Type: string | null.
        frame_to_bounds_json: /home/mamba/input_dir/static_ancillary_files/opera-nisar-disp-0.1.0-frame-to-bounds.json
        # JSON file containing list of reference date changes for each frame.
        #   Type: string | null.
        reference_date_database_json: /home/mamba/input_dir/static_ancillary_files/opera-disp-nisar-reference-dates-dummy.json
      primary_executable:
        # Product type of the PGE.
        #   Type: string.
        product_type: DISP_NISAR_HISTORICAL
      product_path_group:
        # REQUIRED: Directory where PGE will place results.
        #   Type: string.
        product_path: /home/mamba/output_dir
        # Path to the scratch directory.
        #   Type: string.
        scratch_path: /home/mamba/scratch_dir
        # Path to the SAS output directory.
        #   Type: string.
        sas_output_path: /home/mamba/output_dir
        # Version of the product, in <major>.<minor> format.
        #   Type: string.
        product_version: '0.4'
        # Whether the SAS should output and save the Compressed SLCs in addition to the standard
        #   product output.
        #   Type: boolean.
        save_compressed_slc: true
      worker_settings:
        # Whether to use GPU for processing (if available).
        #   Type: boolean.
        gpu_enabled: false
        # Number of threads to use per worker. This sets the OMP_NUM_THREADS environment variable in
        #   each python process.
        #   Type: integer.
        threads_per_worker: 2
        # If processing separate spatial bursts, number of bursts to run in parallel for wrapped-
        #   phase-estimation.
        #   Type: integer.
        n_parallel_bursts: 1
        # Size (rows, columns) of blocks of data to load at a time.
        #   Type: array.
        block_shape:
          - 512
          - 512
      # Path to the output log file in addition to logging to stderr.
      #   Type: string | null.
      log_file: /home/mamba/output_dir/log_sas.log
